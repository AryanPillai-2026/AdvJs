<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        fieldset { margin-bottom: 20px; padding: 15px; }
        canvas { border: 2px solid #333; cursor: pointer; }
        #totalDisp { font-size: 1.2em; font-weight: bold; color: green; margin-top: 10px; }
    </style>
</head>
<body>

    <h3>Event Booking System</h3>

    <form id="bookingForm">
        <fieldset>
            <legend>Personal Info</legend>
            Name: <input type="text" id="nm"><br>
            Email: <input type="text" id="em"><br>
            Phone: <input type="text" id="ph"><br>
            Gender: <input type="radio" name="gen"> M <input type="radio" name="gen"> F
        </fieldset>

        <fieldset>
            <legend>Event Selection</legend>
            Event Type: 
            <select id="et">
                <option value="500">Seminar ($500)</option>
                <option value="800">Workshop ($800)</option>
                <option value="1500">Concert ($1500)</option>
            </select><br><br>
            
            Extra Services:<br>
            <input type="checkbox" name="srv" value="200"> Food ($200)
            <input type="checkbox" name="srv" value="100"> Kit ($100)
            <input type="checkbox" name="srv" value="50"> Certificate ($50)<br><br>
            
            Tickets: 
            <select id="tk">
                <option value="1">1</option><option value="2">2</option>
                <option value="3">3</option><option value="4">4</option>
                <option value="5">5</option>
            </select><br><br>
            
            Session: 
            <select id="sess" size="3">
                <option>Morning</option>
                <option>Afternoon</option>
                <option>Evening</option>
            </select>
        </fieldset>

        <fieldset>
            <legend>Seat Layout (Select Seats)</legend>
            <canvas id="seatCanvas" width="155" height="155"></canvas>
            <div id="selectedInfo">Seats Selected: 0</div>
        </fieldset>

        <div id="totalDisp">Total Amount: $0</div><br>
        <button type="button" onclick="validateBooking()">Confirm Booking</button>
    </form>

    <script>
        const cv = document.getElementById('seatCanvas');
        const ctx = cv.getContext('2d');
        let selectedSeats = [];
        
        function drawGrid() {
            ctx.clearRect(0, 0, cv.width, cv.height);
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    ctx.strokeStyle = "#000";
                    ctx.strokeRect(c * 30 + 5, r * 30 + 5, 25, 25);
                }
            }
        }
        drawGrid();

        cv.onclick = function(e) {
            let x = Math.floor((e.offsetX - 5) / 30);
            let y = Math.floor((e.offsetY - 5) / 30);
            
            if (x >= 0 && x < 5 && y >= 0 && y < 5) {
                let seatId = `${x},${y}`;
                let index = selectedSeats.indexOf(seatId);
                
                if (index > -1) {
                    selectedSeats.splice(index, 1);
                    ctx.clearRect(x * 30 + 6, y * 30 + 6, 23, 23);
                } else {
                    selectedSeats.push(seatId);
                    ctx.fillStyle = "orange";
                    ctx.fillRect(x * 30 + 6, y * 30 + 6, 23, 23);
                }
                document.getElementById('selectedInfo').innerText = "Seats Selected: " + selectedSeats.length;
                updatePrice();
            }
        };

        function updatePrice() {
            let base = parseInt(document.getElementById('et').value);
            let tickets = parseInt(document.getElementById('tk').value);
            let srvs = document.getElementsByName('srv');
            let srvTotal = 0;
            
            for (let i = 0; i < srvs.length; i++) {
                if (srvs[i].checked) srvTotal += parseInt(srvs[i].value);
            }
            
            let total = (base * selectedSeats.length) + srvTotal;
            document.getElementById('totalDisp').innerText = "Total Amount: $" + total;
        }

        function validateBooking() {
            let em = document.getElementById('em').value;
            let tkLimit = parseInt(document.getElementById('tk').value);
            let emailRegex = /^\S+@\S+\.\S+$/;

            if (!emailRegex.test(em)) {
                alert("Enter valid email");
                return;
            }

            if (selectedSeats.length === 0) {
                alert("Select at least one seat");
                return;
            }

            if (selectedSeats.length > tkLimit) {
                alert("Selected seats exceed ticket quantity!");
                return;
            }

            alert("Booking Successful for " + selectedSeats.length + " seats!");
        }
    </script>
</body>
</html>
